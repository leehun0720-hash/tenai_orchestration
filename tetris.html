<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Tetris - Cyberpunk Edition</title>
    <!-- Tailwind CSS v4 CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Google Material Icons -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800;900&family=Outfit:wght@300;400;600;700&display=swap');
        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #090514 0%, #120a2a 100%);
        }
        .orbitron {
            font-family: 'Orbitron', sans-serif;
        }
        .neon-border {
            box-shadow: 0 0 15px rgba(139, 92, 246, 0.4), inset 0 0 15px rgba(139, 92, 246, 0.2);
        }
        .neon-text-violet {
            text-shadow: 0 0 5px rgba(167, 139, 250, 0.8), 0 0 10px rgba(167, 139, 250, 0.4);
        }
        .neon-text-cyan {
            text-shadow: 0 0 5px rgba(34, 211, 238, 0.8), 0 0 10px rgba(34, 211, 238, 0.4);
        }
    </style>
</head>
<body class="min-h-screen text-slate-100 flex flex-col justify-between p-4 md:p-6 overflow-x-hidden">

    <!-- 헤더 -->
    <header class="max-w-4xl w-full mx-auto flex items-center justify-between border-b border-violet-950/50 pb-4 mb-4">
        <div class="flex items-center gap-2">
            <span class="material-icons text-violet-400 animate-pulse text-2xl">videogame_asset</span>
            <h1 class="orbitron text-xl font-black tracking-widest bg-gradient-to-r from-violet-400 to-cyan-400 bg-clip-text text-transparent">
                NEON TETRIS
            </h1>
        </div>
        <div class="flex items-center gap-2">
            <button id="soundToggle" onclick="toggleSound()" class="p-2 rounded-lg bg-violet-950/40 border border-violet-900/30 hover:bg-violet-900/40 transition text-violet-400 flex items-center justify-center">
                <span class="material-icons text-lg" id="soundIcon">volume_up</span>
            </button>
            <span class="text-xs orbitron font-bold text-cyan-400 bg-cyan-950/30 border border-cyan-800/30 px-2.5 py-1 rounded-full uppercase tracking-wider">
                Cyberpunk v1.2
            </span>
        </div>
    </header>

    <!-- 메인 레이아웃 -->
    <main class="max-w-4xl w-full mx-auto flex-1 grid grid-cols-1 md:grid-cols-12 gap-6 items-center">
        
        <!-- 왼쪽 정보 판넬 (3단) -->
        <section class="md:col-span-3 flex md:flex-col gap-4 justify-between md:justify-start w-full">
            <!-- 점수판 -->
            <div class="flex-1 bg-violet-950/20 border border-violet-900/30 rounded-2xl p-4 flex flex-col items-center justify-center neon-border">
                <p class="text-xs orbitron text-violet-400 uppercase tracking-widest mb-1 font-bold">Score</p>
                <p id="score" class="orbitron text-2xl md:text-3xl font-black text-white neon-text-violet">000000</p>
            </div>
            
            <!-- 라인 지우기 판 -->
            <div class="flex-1 bg-violet-950/20 border border-violet-900/30 rounded-2xl p-4 flex flex-col items-center justify-center neon-border">
                <p class="text-xs orbitron text-cyan-400 uppercase tracking-widest mb-1 font-bold">Lines</p>
                <p id="lines" class="orbitron text-2xl md:text-3xl font-black text-white neon-text-cyan">000</p>
            </div>

            <!-- 레벨 판 -->
            <div class="flex-1 bg-violet-950/20 border border-violet-900/30 rounded-2xl p-4 flex flex-col items-center justify-center neon-border">
                <p class="text-xs orbitron text-amber-400 uppercase tracking-widest mb-1 font-bold">Level</p>
                <p id="level" class="orbitron text-2xl md:text-3xl font-black text-amber-300">1</p>
            </div>
        </section>

        <!-- 중앙 테트리스 보드 (6단) -->
        <section class="md:col-span-6 flex flex-col items-center justify-center">
            <div class="relative bg-slate-950 border-4 border-violet-900/80 rounded-2xl p-1 shadow-2xl shadow-violet-950/50">
                <canvas id="tetris" width="240" height="480" class="rounded-lg bg-slate-950/90"></canvas>
                
                <!-- 게임 오버 / 시작 오버레이 -->
                <div id="overlay" class="absolute inset-0 bg-slate-950/85 backdrop-blur-sm rounded-xl flex flex-col items-center justify-center p-6 text-center transition-all duration-300">
                    <h3 id="overlayTitle" class="orbitron text-2xl font-black text-violet-400 tracking-wider mb-2">NEON TETRIS</h3>
                    <p id="overlayDesc" class="text-xs text-slate-400 mb-6 leading-relaxed">방향키로 블록 이동 및 회전<br>Space키로 즉시 떨어뜨리기</p>
                    <button id="startBtn" onclick="startGame()" class="orbitron bg-gradient-to-r from-violet-600 to-cyan-500 hover:from-violet-500 hover:to-cyan-400 text-white font-bold py-3 px-6 rounded-xl shadow-lg shadow-violet-500/20 transition-all transform active:scale-95 cursor-pointer text-sm tracking-widest">
                        START GAME
                    </button>
                </div>
            </div>
        </section>

        <!-- 오른쪽 서브 정보 & 컨트롤 패널 (3단) -->
        <section class="md:col-span-3 flex flex-col gap-4 w-full h-full justify-between">
            <!-- 다음 블록 -->
            <div class="bg-violet-950/20 border border-violet-900/30 rounded-2xl p-4 flex flex-col items-center justify-center neon-border">
                <p class="text-xs orbitron text-violet-400 uppercase tracking-widest mb-3 font-bold">Next Block</p>
                <div class="w-24 h-24 bg-slate-950/50 border border-violet-950/50 rounded-xl flex items-center justify-center p-2">
                    <canvas id="next" width="80" height="80"></canvas>
                </div>
            </div>

            <!-- 모바일용 버추얼 패드 -->
            <div class="grid grid-cols-3 gap-2 bg-violet-950/10 p-3 rounded-2xl border border-violet-950/50 md:hidden">
                <button onclick="handleVirtualKey('ArrowLeft')" class="p-3 bg-violet-950/30 active:bg-violet-800/40 rounded-xl border border-violet-900/20 flex items-center justify-center text-violet-300">
                    <span class="material-icons">arrow_back</span>
                </button>
                <button onclick="handleVirtualKey('ArrowUp')" class="p-3 bg-violet-950/30 active:bg-violet-800/40 rounded-xl border border-violet-900/20 flex items-center justify-center text-violet-300">
                    <span class="material-icons">rotate_right</span>
                </button>
                <button onclick="handleVirtualKey('ArrowRight')" class="p-3 bg-violet-950/30 active:bg-violet-800/40 rounded-xl border border-violet-900/20 flex items-center justify-center text-violet-300">
                    <span class="material-icons">arrow_forward</span>
                </button>
                <button onclick="handleVirtualKey('ArrowDown')" class="p-3 bg-violet-950/30 active:bg-violet-800/40 rounded-xl border border-violet-900/20 flex items-center justify-center text-violet-300">
                    <span class="material-icons">arrow_downward</span>
                </button>
                <button onclick="handleVirtualKey('Space')" class="col-span-2 p-3 bg-cyan-950/30 active:bg-cyan-800/40 rounded-xl border border-cyan-900/20 flex items-center justify-center text-cyan-300 text-xs font-bold uppercase tracking-wider">
                    DROP
                </button>
            </div>
            
            <!-- 조작 가이드 (PC) -->
            <div class="hidden md:block bg-slate-950/40 border border-violet-950/50 rounded-2xl p-4 text-xs text-slate-400 space-y-2">
                <p class="font-bold text-slate-300 mb-1 flex items-center gap-1.5"><span class="material-icons text-xs text-violet-400">keyboard</span> PC 조작 방법</p>
                <p class="flex justify-between"><span>◀ ▶</span> <span>블록 좌우 이동</span></p>
                <p class="flex justify-between"><span>▲</span> <span>블록 회전</span></p>
                <p class="flex justify-between"><span>▼</span> <span>빠르게 아래로</span></p>
                <p class="flex justify-between"><span>Space</span> <span>즉시 떨어뜨리기 (하드드롭)</span></p>
                <p class="flex justify-between"><span>P</span> <span>일시 정지</span></p>
            </div>
        </section>
    </main>

    <!-- 푸터 -->
    <footer class="text-center text-[10px] text-slate-600 dark:text-slate-500 mt-4 max-w-4xl w-full mx-auto border-t border-violet-950/30 pt-3">
        &copy; 2026 Neon Tetris. Built for Agent Orchestra Dashboard verification.
    </footer>

    <!-- 게임 소스 코드 -->
    <script>
        const canvas = document.getElementById('tetris');
        const context = canvas.getContext('2d');
        const nextCanvas = document.getElementById('next');
        const nextContext = nextCanvas.getContext('2d');

        // 스케일 지정 (보드 규격 10x20)
        context.scale(24, 24);
        nextContext.scale(20, 20);

        let soundEnabled = true;
        let audioCtx = null;

        // 소리 토글
        function toggleSound() {
            soundEnabled = !soundEnabled;
            document.getElementById('soundIcon').innerText = soundEnabled ? 'volume_up' : 'volume_off';
        }

        // Web Audio API 비프음 생성 헬퍼
        function playBeep(freq, type, duration) {
            if (!soundEnabled) return;
            try {
                if (!audioCtx) {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                }
                const osc = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                
                osc.type = type || 'sine';
                osc.frequency.value = freq;
                
                gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                // 지수적으로 소리 줄임
                gainNode.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
                
                osc.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                
                osc.start();
                osc.stop(audioCtx.currentTime + duration);
            } catch (e) {
                console.error("Audio error", e);
            }
        }

        // 테트리스 조각들 색상 매핑
        const colors = [
            null,
            '#a78bfa', // T - Violet
            '#22d3ee', // I - Cyan
            '#facc15', // O - Yellow
            '#fb923c', // L - Orange
            '#60a5fa', // J - Blue
            '#4ade80', // S - Green
            '#f87171'  // Z - Red
        ];

        // 보드 매트릭스 생성
        function createMatrix(w, h) {
            const matrix = [];
            while (h--) {
                matrix.push(new Array(w).fill(0));
            }
            return matrix;
        }

        // 테트리스 조각 조형 함수
        function createPiece(type) {
            if (type === 'T') {
                return [
                    [0, 0, 0],
                    [1, 1, 1],
                    [0, 1, 0],
                ];
            } else if (type === 'I') {
                return [
                    [0, 2, 0, 0],
                    [0, 2, 0, 0],
                    [0, 2, 0, 0],
                    [0, 2, 0, 0],
                ];
            } else if (type === 'O') {
                return [
                    [3, 3],
                    [3, 3],
                ];
            } else if (type === 'L') {
                return [
                    [0, 4, 0],
                    [0, 4, 0],
                    [0, 4, 4],
                ];
            } else if (type === 'J') {
                return [
                    [0, 5, 0],
                    [0, 5, 0],
                    [5, 5, 0],
                ];
            } else if (type === 'S') {
                return [
                    [0, 6, 6],
                    [6, 6, 0],
                    [0, 0, 0],
                ];
            } else if (type === 'Z') {
                return [
                    [7, 7, 0],
                    [0, 7, 7],
                    [0, 0, 0],
                ];
            }
        }

        const arena = createMatrix(10, 20);

        const player = {
            pos: {x: 0, y: 0},
            matrix: null,
            score: 0,
            lines: 0,
            level: 1,
            nextMatrix: null
        };

        let dropCounter = 0;
        let dropInterval = 1000;
        let lastTime = 0;
        let gameOver = true;
        let isPaused = false;

        // 충돌 체크
        function collide(arena, player) {
            const [m, o] = [player.matrix, player.pos];
            for (let y = 0; y < m.length; ++y) {
                for (let x = 0; x < m[y].length; ++x) {
                    if (m[y][x] !== 0 &&
                       (arena[y + o.y] === undefined ||
                        arena[y + o.y][x + o.x] === undefined ||
                        arena[y + o.y][x + o.x] !== 0)) {
                        return true;
                    }
                }
            }
            return false;
        }

        // 보드 병합
        function merge(arena, player) {
            player.matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        arena[y + player.pos.y][x + player.pos.x] = value;
                    }
                });
            });
        }

        // 그리기 함수
        function draw() {
            context.fillStyle = '#090514';
            context.fillRect(0, 0, canvas.width, canvas.height);

            // 가이드라인 격자 무늬 그리기
            context.strokeStyle = 'rgba(139, 92, 246, 0.05)';
            context.lineWidth = 0.05;
            for (let i = 0; i < 10; i++) {
                context.beginPath();
                context.moveTo(i, 0);
                context.lineTo(i, 20);
                context.stroke();
            }
            for (let j = 0; j < 20; j++) {
                context.beginPath();
                context.moveTo(0, j);
                context.lineTo(10, j);
                context.stroke();
            }

            drawMatrix(arena, {x: 0, y: 0});
            if (!gameOver) {
                drawMatrix(player.matrix, player.pos);
            }
        }

        // 매트릭스 렌더링
        function drawMatrix(matrix, offset) {
            matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        // 네온 큐브 렌더링
                        context.fillStyle = colors[value];
                        context.fillRect(x + offset.x, y + offset.y, 1, 1);
                        
                        // 하이라이트 경계
                        context.strokeStyle = 'rgba(255, 255, 255, 0.3)';
                        context.lineWidth = 0.08;
                        context.strokeRect(x + offset.x, y + offset.y, 1, 1);
                    }
                });
            });
        }

        // 다음 블록 렌더링
        function drawNext() {
            nextContext.fillStyle = 'rgba(15, 23, 42, 0.5)';
            nextContext.fillRect(0, 0, nextCanvas.width, nextCanvas.height);

            if (player.nextMatrix) {
                // 중앙에 맞추기 위해 오프셋 계산
                const matrix = player.nextMatrix;
                const offset = {
                    x: (4 - matrix[0].length) / 2,
                    y: (4 - matrix.length) / 2
                };

                matrix.forEach((row, y) => {
                    row.forEach((value, x) => {
                        if (value !== 0) {
                            nextContext.fillStyle = colors[value];
                            nextContext.fillRect(x + offset.x, y + offset.y, 1, 1);
                            
                            nextContext.strokeStyle = 'rgba(255, 255, 255, 0.2)';
                            nextContext.lineWidth = 0.08;
                            nextContext.strokeRect(x + offset.x, y + offset.y, 1, 1);
                        }
                    });
                });
            }
        }

        // 블록 드롭
        function playerDrop() {
            player.pos.y++;
            if (collide(arena, player)) {
                player.pos.y--;
                merge(arena, player);
                playerReset();
                arenaSweep();
                updateScore();
                playBeep(250, 'triangle', 0.1);
            }
            dropCounter = 0;
        }

        // 하드 드롭
        function playerHardDrop() {
            if (gameOver || isPaused) return;
            let drops = 0;
            while (!collide(arena, player)) {
                player.pos.y++;
                drops++;
            }
            player.pos.y--;
            merge(arena, player);
            playerReset();
            arenaSweep();
            updateScore();
            playBeep(350, 'sawtooth', 0.08);
            dropCounter = 0;
        }

        // 플레이어 수평 이동
        function playerMove(dir) {
            player.pos.x += dir;
            if (collide(arena, player)) {
                player.pos.x -= dir;
            } else {
                playBeep(400, 'sine', 0.05);
            }
        }

        // 블록 무작위 공급 리스트
        const pieces = 'ILJOTSZ';
        function playerReset() {
            if (!player.nextMatrix) {
                player.nextMatrix = createPiece(pieces[pieces.length * Math.random() | 0]);
            }
            player.matrix = player.nextMatrix;
            player.nextMatrix = createPiece(pieces[pieces.length * Math.random() | 0]);
            
            player.pos.y = 0;
            player.pos.x = (arena[0].length / 2 | 0) - (player.matrix[0].length / 2 | 0);

            drawNext();

            // 블록 소환 즉시 충돌 시 게임 오버
            if (collide(arena, player)) {
                gameOver = true;
                playBeep(120, 'sawtooth', 0.6); // 웅장한 게임오버 톤
                setTimeout(() => playBeep(80, 'sawtooth', 0.8), 200);
                document.getElementById('overlayTitle').innerText = "GAME OVER";
                document.getElementById('overlayDesc').innerHTML = `최종 점수: <span class="text-cyan-400 font-bold orbitron">${player.score}</span><br>난이도 레벨: <span class="text-amber-400 font-bold">${player.level}</span>`;
                document.getElementById('startBtn').innerText = "TRY AGAIN";
                document.getElementById('overlay').classList.remove('hidden');
            }
        }

        // 블록 회전
        function playerRotate(dir) {
            const pos = player.pos.x;
            let offset = 1;
            rotate(player.matrix, dir);
            while (collide(arena, player)) {
                player.pos.x += offset;
                offset = -(offset + (offset > 0 ? 1 : -1));
                if (offset > player.matrix[0].length) {
                    rotate(player.matrix, -dir);
                    player.pos.x = pos;
                    return;
                }
            }
            playBeep(520, 'sine', 0.05);
        }

        function rotate(matrix, dir) {
            for (let y = 0; y < matrix.length; ++y) {
                for (let x = 0; x < y; ++x) {
                    [
                        matrix[x][y],
                        matrix[y][x],
                    ] = [
                        matrix[y][x],
                        matrix[x][y],
                    ];
                }
            }

            if (dir > 0) {
                matrix.forEach(row => row.reverse());
            } else {
                matrix.reverse();
            }
        }

        // 줄 지우기 검사
        function arenaSweep() {
            let rowCount = 1;
            outer: for (let y = arena.length - 1; y > 0; --y) {
                for (let x = 0; x < arena[y].length; ++x) {
                    if (arena[y][x] === 0) {
                        continue outer;
                    }
                }

                const row = arena.splice(y, 1)[0].fill(0);
                arena.unshift(row);
                ++y;

                player.score += rowCount * 100;
                player.lines += 1;
                rowCount *= 2;
                
                // 줄 지우기 특수 비프음
                playBeep(880, 'sine', 0.15);
                setTimeout(() => playBeep(1320, 'sine', 0.2), 80);

                // 레벨 업 시스템 (10줄 당 레벨 업 및 낙하 속도 증가)
                player.level = Math.floor(player.lines / 10) + 1;
                dropInterval = Math.max(100, 1000 - (player.level - 1) * 100);
            }
        }

        // 점수 갱신 UI
        function updateScore() {
            document.getElementById('score').innerText = String(player.score).padStart(6, '0');
            document.getElementById('lines').innerText = String(player.lines).padStart(3, '0');
            document.getElementById('level').innerText = player.level;
        }

        // 루프 업데이트
        function update(time = 0) {
            if (gameOver || isPaused) return;

            const deltaTime = time - lastTime;
            lastTime = time;

            dropCounter += deltaTime;
            if (dropCounter > dropInterval) {
                playerDrop();
            }

            draw();
            requestAnimationFrame(update);
        }

        // 키 컨트롤러
        document.addEventListener('keydown', event => {
            if (gameOver) return;

            if (event.key === 'ArrowLeft') {
                playerMove(-1);
            } else if (event.key === 'ArrowRight') {
                playerMove(1);
            } else if (event.key === 'ArrowDown') {
                playerDrop();
            } else if (event.key === 'ArrowUp') {
                playerRotate(1);
            } else if (event.key === 'Space' || event.code === 'Space') {
                event.preventDefault(); // 스크롤 바운딩 방지
                playerHardDrop();
            } else if (event.key === 'p' || event.key === 'P' || event.key === 'ㅔ' || event.key === 'ㅖ') {
                togglePause();
            }
        });

        // 일시정지
        function togglePause() {
            if (gameOver) return;
            isPaused = !isPaused;
            if (isPaused) {
                document.getElementById('overlayTitle').innerText = "PAUSED";
                document.getElementById('overlayDesc').innerText = "P키를 눌러 일시정지를 해제하세요.";
                document.getElementById('startBtn').innerText = "RESUME";
                document.getElementById('overlay').classList.remove('hidden');
            } else {
                document.getElementById('overlay').classList.add('hidden');
                lastTime = performance.now();
                update();
            }
        }

        // 모바일 가상버튼 핸들러
        function handleVirtualKey(key) {
            if (gameOver) return;
            if (key === 'ArrowLeft') playerMove(-1);
            else if (key === 'ArrowRight') playerMove(1);
            else if (key === 'ArrowDown') playerDrop();
            else if (key === 'ArrowUp') playerRotate(1);
            else if (key === 'Space') playerHardDrop();
        }

        // 게임 시작/재시작
        function startGame() {
            if (isPaused) {
                togglePause();
                return;
            }
            
            // 아레나 초기화
            for (let y = 0; y < arena.length; y++) {
                arena[y].fill(0);
            }
            
            player.score = 0;
            player.lines = 0;
            player.level = 1;
            player.nextMatrix = null;
            dropInterval = 1000;
            
            updateScore();
            
            gameOver = false;
            isPaused = false;
            
            document.getElementById('overlay').classList.add('hidden');
            
            // 첫 사운드
            playBeep(523.25, 'sine', 0.15); // C5
            setTimeout(() => playBeep(659.25, 'sine', 0.15), 100); // E5
            setTimeout(() => playBeep(783.99, 'sine', 0.3), 200); // G5

            playerReset();
            lastTime = performance.now();
            update();
        }

        // 최초 정적 그리기
        draw();
    </script>
</body>
</html>
